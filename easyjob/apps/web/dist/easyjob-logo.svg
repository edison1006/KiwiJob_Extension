<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140" role="img" aria-labelledby="title">
  <title id="title">EasyJob</title>
  <defs>
    <linearGradient id="ej-brand" x1="8%" y1="0%" x2="92%" y2="100%">
      <stop offset="0%" stop-color="#00B4DB"/>
      <stop offset="45%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#8E24AA"/>
    </linearGradient>
  </defs>
  <!-- handle -->
  <path
    d="M 76 38 V 30 C76 22 84 16 100 16 C116 16 124 22 124 30 V 38"
    stroke="url(#ej-brand)"
    stroke-width="5"
    stroke-linecap="round"
    fill="none"
  />
  <!-- briefcase body -->
  <rect x="58" y="36" width="84" height="56" rx="14" fill="url(#ej-brand)"/>
  <!-- white check (right side) -->
  <path
    d="M 96 62 L 108 74 L 132 48"
    stroke="#ffffff"
    stroke-width="6"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />
  <!-- wordmark -->
  <text
    x="100"
    y="118"
    text-anchor="middle"
    font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif"
    font-size="22"
    font-weight="800"
    letter-spacing="-0.02em"
    fill="url(#ej-brand)"
  >EasyJob</text>
</svg>
