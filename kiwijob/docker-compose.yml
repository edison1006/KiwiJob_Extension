services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: kiwijob
      POSTGRES_PASSWORD: kiwijob
      POSTGRES_DB: kiwijob
    ports:
      - "5432:5432"
    volumes:
      - kiwijob_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kiwijob -d kiwijob"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://kiwijob:kiwijob@db:5432/kiwijob
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      RESUME_STORAGE_DIR: /data/resumes
    ports:
      - "8000:8000"
    volumes:
      - kiwijob_resumes:/data/resumes
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      db:
        condition: service_healthy

volumes:
  kiwijob_pg:
  kiwijob_resumes:
