name: KiwiJob CI

on:
  push:
    paths:
      - "kiwijob/**"
      - ".github/workflows/kiwijob-ci.yml"
  pull_request:
    paths:
      - "kiwijob/**"
      - ".github/workflows/kiwijob-ci.yml"

defaults:
  run:
    working-directory: kiwijob

jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: kiwijob
          POSTGRES_PASSWORD: kiwijob
          POSTGRES_DB: kiwijob_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kiwijob -d kiwijob_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: kiwijob/package-lock.json

      - name: Install Node dependencies
        run: npm ci

      - name: Build shared, web, extension
        run: npm run build:shared && npm run build:web && npm run build:extension

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install API deps and run tests
        working-directory: kiwijob/apps/api
        env:
          DATABASE_URL: postgresql+psycopg2://kiwijob:kiwijob@localhost:5432/kiwijob_test
        run: |
          pip install -r requirements.txt
          python -m alembic upgrade head
          python -m pytest -q
